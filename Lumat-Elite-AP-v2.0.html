<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Lumat Elite AP</title>
<style>
  :root{
    --bg:#0b1220; --panel:#121a2b; --panel2:#182239; --line:#243254;
    --text:#eaf0ff; --muted:#9fb0d0; --accent:#5bd1ff; --accent2:#7ef0c5;
    --warn:#ffb454; --danger:#ff6b81;
    --env:#7ef0c5; --spa:#ffb454; --wh:#5bd1ff;
    --ok:#58d68d;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
    font-synthesis:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;touch-action:manipulation;overscroll-behavior:none;}
  a{color:var(--accent);text-decoration:none}
  button{font:inherit;color:inherit;border:0;background:transparent;cursor:pointer}
  input,select,textarea{font:inherit;color:inherit}
  .app{max-width:1100px;margin:0 auto;padding:16px 16px 120px}
  header.top{display:flex;align-items:center;gap:12px;padding:10px 4px 18px}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#5bd1ff,#7ef0c5);display:grid;place-items:center;font-weight:900;color:#0b1220;font-size:20px}
  .hello h1{margin:0;font-size:22px;letter-spacing:.2px}
  .hello p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .streak{margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;text-align:center;min-width:92px}
  .streak b{display:block;font-size:22px;color:var(--accent2)}
  .streak small{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px}

  /* tabs */
  nav.tabs{position:sticky;top:0;z-index:5;background:rgba(11,18,32,.85);backdrop-filter:saturate(140%) blur(10px);
    display:flex;gap:8px;overflow-x:auto;padding:10px 4px;border-bottom:1px solid var(--line);margin:0 -16px 16px;padding-left:16px;padding-right:16px;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{flex:0 0 auto;padding:12px 16px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--text);font-weight:600;font-size:15px}
  nav.tabs button.active{background:linear-gradient(135deg,#5bd1ff,#7ef0c5);color:#0b1220;border-color:transparent}

  /* cards */
  .grid{display:grid;gap:14px}
  @media(min-width:720px){.grid.cols-2{grid-template-columns:1fr 1fr}.grid.cols-3{grid-template-columns:1fr 1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 10px;font-size:17px}
  .card h3{margin:0 0 8px;font-size:15px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .muted{color:var(--muted)}
  .row{display:flex;align-items:center;gap:10px}
  .row.between{justify-content:space-between}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);font-size:12px;color:var(--muted)}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot.env{background:var(--env)}.dot.spa{background:var(--spa)}.dot.wh{background:var(--wh)}

  /* countdown — always horizontal (3 across) */
  .countdowns{display:grid;gap:10px;grid-template-columns:repeat(3,1fr)}
  .cd{padding:12px 10px;border-radius:14px;background:var(--panel2);border:1px solid var(--line);position:relative;overflow:hidden;min-width:0}
  .cd .num{font-size:clamp(28px,6vw,46px);font-weight:900;line-height:1}
  .cd .lbl{font-size:clamp(9px,1.2vw,12px);color:var(--muted);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cd .name{font-weight:700;margin-top:6px;font-size:clamp(11px,1.6vw,15px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cd .date{color:var(--muted);font-size:clamp(10px,1.2vw,12px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cd.env{border-left:4px solid var(--env)}
  .cd.spa{border-left:4px solid var(--spa)}
  .cd.wh{border-left:4px solid var(--wh)}

  /* progress bars */
  .bar{height:10px;border-radius:999px;background:#0e1628;border:1px solid var(--line);overflow:hidden}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,#5bd1ff,#7ef0c5)}
  .bar.env>span{background:linear-gradient(90deg,#7ef0c5,#58d68d)}
  .bar.spa>span{background:linear-gradient(90deg,#ffb454,#ff8a5b)}
  .bar.wh>span{background:linear-gradient(90deg,#5bd1ff,#6a9bff)}

  /* big buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;padding:12px 18px;border-radius:14px;font-weight:700;font-size:16px;background:var(--panel2);border:1px solid var(--line)}
  .btn.primary{background:linear-gradient(135deg,#5bd1ff,#7ef0c5);color:#0b1220;border:0}
  .btn.warn{background:linear-gradient(135deg,#ffb454,#ff8a5b);color:#0b1220;border:0}
  .btn.ghost{background:transparent}
  .btn:active{transform:scale(.98)}
  .btn.block{width:100%}
  .btns{display:flex;flex-wrap:wrap;gap:10px}

  /* timer */
  .timer{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px}
  .timer .clock{font-size:72px;font-weight:900;letter-spacing:1px;font-variant-numeric:tabular-nums}
  .timer .phase{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
  .ring{--p:0;width:220px;height:220px;border-radius:50%;
    background:conic-gradient(var(--accent2) calc(var(--p)*1%), #1a2640 0);
    display:grid;place-items:center;position:relative}
  .ring::before{content:"";position:absolute;inset:10px;border-radius:50%;background:var(--panel)}
  .ring>div{position:relative;text-align:center}

  /* flashcard */
  .flash{perspective:1200px}
  .flash-inner{min-height:220px;border-radius:16px;position:relative;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;border-radius:16px;display:grid;place-items:center;padding:24px;text-align:center;
    background:var(--panel2);border:1px solid var(--line);backface-visibility:hidden;font-size:22px;font-weight:600;line-height:1.3}
  .flash-back{transform:rotateY(180deg);font-size:18px;font-weight:500;color:#d7e3ff}
  .flash-nav{display:flex;justify-content:space-between;gap:10px;margin-top:12px}
  .flash-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:8px}

  /* quiz */
  .q{padding:14px;border-radius:14px;background:var(--panel2);border:1px solid var(--line)}
  .q h3{margin:0 0 12px;color:var(--text);font-size:17px;text-transform:none;letter-spacing:0}
  .choices{display:grid;gap:10px}
  .choice{padding:14px 16px;border-radius:12px;background:#0e1628;border:1px solid var(--line);text-align:left;font-size:15px}
  .choice.correct{background:rgba(88,214,141,.18);border-color:#58d68d}
  .choice.wrong{background:rgba(255,107,129,.15);border-color:#ff6b81}
  .choice:active{transform:scale(.99)}
  .explain{margin-top:10px;padding:10px 12px;background:#0e1628;border:1px dashed var(--line);border-radius:10px;color:var(--muted);font-size:13px;display:none}
  .explain.show{display:block}

  /* checklist */
  .chk{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);margin-bottom:8px}
  .chk input{width:22px;height:22px;accent-color:#7ef0c5}
  .chk label{flex:1;font-size:15px}
  .chk .tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}

  /* schedule */
  table.sched{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:14px}
  table.sched th{text-align:left;color:var(--muted);font-weight:600;padding:4px 8px;font-size:12px;text-transform:uppercase;letter-spacing:.6px}
  table.sched td{background:var(--panel2);padding:12px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  table.sched td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}
  table.sched td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}
  .tag-env{color:var(--env)}.tag-spa{color:var(--spa)}.tag-wh{color:var(--wh)}

  .hidden{display:none!important}

  /* view fade */
  .view{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  footer{margin-top:30px;text-align:center;color:var(--muted);font-size:12px}
</style>
</head>

<div class="app">

  <header class="top">
    <div class="logo">L</div>
    <div class="hello">
      <h1>Lumat Elite AP</h1>
      <p id="today"></p>
      <p style="font-size:11px;color:var(--muted);margin:2px 0 0;letter-spacing:0.04em">v2.0 &nbsp;·&nbsp; <span style="font-size:14px;font-weight:700;color:#22c55e;letter-spacing:0.02em">Starting PG: Luca</span></p>

</div>

<script>
/* ============================================================
   DATA

const EXAMS = [
  { id:"wh",  name:"AP World History",       date:"2026-05-07T08:00:00", color:"wh",  emoji:"📜" },

/* ---------- ENV SCIENCE ---------- */
/* Topics taken directly from the AP Environmental Science Course and Exam Description (College Board, 2025). */
const ENV_UNITS = [

  { id:6, name:"Energy Resources and Consumption", weight:"10–15%", topics:[

  { id:9, name:"Global Change ⭐", weight:"15–20%", focus:true, topics:[

    "9.10 Human Impacts on Biodiversity"

const ENV_FLASH = [
  // Unit 5
  {u:5,q:"Tragedy of the Commons",a:"Shared resource overused by individuals acting in self-interest, hurting the group long-term."},
  {u:5,q:"Clearcutting",a:"Removing all trees in an area. Cheap & efficient but causes erosion, habitat loss, loss of soil nutrients."},
  {u:5,q:"Drip irrigation",a:"Most water-efficient method (~95%). Delivers water directly to roots through tubes."},
  {u:5,q:"Flood irrigation",a:"Cheap but wasteful (~60% efficient). Causes waterlogging and salinization."},
  {u:5,q:"Salinization",a:"Salt buildup in soil from irrigation that makes land unable to support crops."},
  {u:5,q:"Green Revolution",a:"Shift to mechanization, monoculture, GMOs, fertilizers, pesticides, irrigation. ↑yields but ↑environmental costs."},
  {u:5,q:"Integrated Pest Management (IPM)",a:"Combines biological, mechanical, and limited chemical controls to manage pests sustainably."},
  {u:5,q:"CAFO",a:"Concentrated Animal Feeding Operation. High yield, high pollution (manure lagoons, methane, antibiotics)."},
  {u:5,q:"Aquaculture pros/cons",a:"+High protein, less wild catch. -Waste, escaped species, disease, habitat loss (mangroves)."},
  {u:5,q:"Overgrazing",a:"Too many animals feeding in one area → soil compaction, erosion, desertification."},
  {u:5,q:"Surface vs subsurface mining",a:"Surface: cheaper, more destructive (strip, open-pit, mountaintop removal). Subsurface: safer for land, dangerous for workers."},
  {u:5,q:"Urban sprawl",a:"Low-density spread of cities → habitat loss, impervious surfaces, runoff, car dependence."},
  {u:5,q:"Ecological footprint",a:"Land+water needed to support a person/population's resource use & absorb waste."},
  // Unit 8
  {u:8,q:"Point vs nonpoint pollution",a:"Point = single identifiable source (pipe). Nonpoint = diffuse (runoff from fields, roads)."},
  {u:8,q:"Eutrophication",a:"Nutrient (N,P) pollution → algal bloom → die-off → decomposers use O₂ → hypoxic dead zone."},
  {u:8,q:"BOD",a:"Biological Oxygen Demand. Amount of O₂ decomposers use. High BOD = more pollution."},
  {u:8,q:"Dissolved Oxygen (DO) sag",a:"DO drops downstream of pollution source, recovers as organic matter is consumed."},
  {u:8,q:"Thermal pollution",a:"Warm water (often from power plant cooling) lowers DO and stresses aquatic life."},
  {u:8,q:"Bioaccumulation",a:"Buildup of toxins in ONE organism over its life."},
  {u:8,q:"Biomagnification",a:"Increasing concentration of toxins UP the food chain. Top predators most affected (DDT, mercury)."},
  {u:8,q:"POPs",a:"Persistent Organic Pollutants. Don't break down easily (DDT, PCBs, dioxins). Travel globally."},
  {u:8,q:"Endocrine disruptor",a:"Chemical that mimics hormones, disrupting reproduction/development (atrazine, BPA)."},
  {u:8,q:"LD50",a:"Dose that kills 50% of a test population. Lower LD50 = more toxic."},
  {u:8,q:"Dose-response curve",a:"Graph of dose vs % of population affected. Used to establish safety thresholds."},
  {u:8,q:"Sanitary landfill",a:"Engineered: clay/plastic liner, leachate collection, methane capture, daily soil cover."},
  {u:8,q:"Sewage treatment stages",a:"1° physical (screens, settling) → 2° biological (microbes eat organics) → 3° chemical (N,P removal, disinfection)."},
  // Unit 9
  {u:9,q:"Ozone depletion cause",a:"CFCs release Cl in stratosphere → destroys O₃. Addressed by Montreal Protocol (1987)."},
  {u:9,q:"Greenhouse effect",a:"Gases (CO₂, CH₄, N₂O, H₂O, CFCs) absorb outgoing IR radiation, warming atmosphere."},
  {u:9,q:"Global Warming Potential",a:"Heat trapped by a gas relative to CO₂. CH₄ ≈ 25×, N₂O ≈ 300×, CFCs >1000×."},
  {u:9,q:"Ocean acidification",a:"CO₂ + H₂O → H₂CO₃ → lowers ocean pH → harms coral, shellfish, plankton."},
  {u:9,q:"El Niño (ENSO)",a:"Trade winds weaken, warm water pools in E. Pacific → disrupts fisheries & global weather."},
  {u:9,q:"HIPPCO",a:"Drivers of extinction: Habitat loss, Invasive species, Population, Pollution, Climate, Overharvesting."},
  {u:9,q:"Invasive species",a:"Non-native species that spreads aggressively, outcompeting natives. Ex: kudzu, zebra mussel, Burmese python."},
  {u:9,q:"Keystone species",a:"Species with disproportionately large effect on ecosystem (sea otter, wolf, beaver)."},
  // earlier units lighter
  {u:1,q:"10% Rule",a:"Only ~10% of energy passes from one trophic level to the next; rest lost as heat."},
  {u:1,q:"GPP vs NPP",a:"GPP = total photosynthesis. NPP = GPP − respiration. NPP is what's available to consumers."},
  {u:2,q:"Ecosystem services",a:"Provisioning, regulating, cultural, supporting. Value humans get from functioning ecosystems."},
  {u:3,q:"K vs r strategists",a:"K: few offspring, heavy parenting, stable (elephants). r: many offspring, little care, boom/bust (insects)."},

  {u:4,q:"Soil horizons",a:"O (organic), A (topsoil), E (eluviation), B (subsoil), C (parent material), R (bedrock)."},
  {u:6,q:"Cogeneration",a:"Capturing waste heat from electricity generation for heating → much higher efficiency."},
  {u:7,q:"Photochemical smog",a:"NOx + VOCs + sunlight → tropospheric O₃. Worse on hot sunny days in cities."},
  {u:7,q:"Thermal inversion",a:"Warm air traps cool polluted air near surface → smog episodes (LA, Mexico City)."},
];

const ENV_QUIZ = [
  {u:5,q:"Which irrigation method is MOST water efficient?",c:["Flood","Furrow","Drip","Spray"],ans:2,why:"Drip delivers water directly to roots — ~95% efficient."},

/* ============================================================
   HELPERS
============================================================ */
function daysUntil(dateStr){
  const now = new Date();
  const d = new Date(dateStr);
  const diff = Math.ceil((d - now)/(1000*60*60*24));
  return Math.max(0, diff);
}
function pct(done, total){ return total ? Math.round(100*done/total) : 0; }
function el(tag, attrs={}, ...kids){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==="class") e.className = attrs[k];
    else if(k==="html") e.innerHTML = attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for(const kid of kids){
    if(kid==null) continue;
    e.appendChild(typeof kid==="string"?document.createTextNode(kid):kid);
  }
  return e;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function touchStreak(){
  const t = todayStr();
  if(S.streak.lastDate===t) return;
  const y = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(S.streak.lastDate===y) S.streak.count += 1;
  else S.streak.count = 1;
  S.streak.lastDate = t;
  save();
  SFX.streak();
}
/* ============================================================
   SOUND ENGINE (Web Audio API — zero external files)
============================================================ */
let audioCtx = null;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freq, dur=0.15, type="sine", vol=0.25){
  try{
    const ctx=getCtx(), o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playBuzzer(dur=0.7, vol=0.55){
  /* Synthesizes a real basketball buzzer: square wave + distortion + noise layer */
  try{
    const ctx = getCtx();
    // Main buzz oscillator
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g  = ctx.createGain();
    const wave = ctx.createWaveShaper();
    // Hard clip distortion curve
    const n = 256, curve = new Float32Array(n);
    for(let i=0;i<n;i++){ const x=i*2/n-1; curve[i]=Math.max(-1,Math.min(1,x*8)); }
    wave.curve = curve;
    o1.type="square"; o1.frequency.value=140;
    o2.type="sawtooth"; o2.frequency.value=148; // slight detune for rawness
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.setValueAtTime(vol, ctx.currentTime+dur-0.05);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o1.connect(wave); o2.connect(wave); wave.connect(g); g.connect(ctx.destination);
    o1.start(); o2.start();
    o1.stop(ctx.currentTime+dur); o2.stop(ctx.currentTime+dur);
  }catch(e){}
}

function subjInfo(id){

/* ============================================================
   DAILY PLAN GENERATOR
============================================================ */
function getDayPlan(date){
  const day = date.getDay(); // 0 Sun - 6 Sat
  // Priority: Env 40%, Spa 35%, WH 25%. Ramp WH earlier (exam first).
  // Weekday: 1.5h = 3 blocks of 20m focus + breaks (plus travel time). We give 2 sessions: before & after basketball.
  // Weekend: 4 hours = 6 blocks with longer break in middle.
  // Rotate subjects across the week.
  const weekdayRotation = [
    // Mon–Fri (1=Mon..5=Fri)
    null,
    {before:{subject:"wh",label:"World History • Flashcards",slot:"Before basketball (20+10)"},after:{subject:"env",label:"Env Sci • Units 5 focus",slot:"After basketball (20+10)"}},
    {before:{subject:"spa",label:"Spanish • Vocabulary",slot:"Before basketball (20+10)"},after:{subject:"env",label:"Env Sci • Quiz Unit 8",slot:"After basketball (20+10)"}},
    {before:{subject:"env",label:"Env Sci • Unit 9 flashcards",slot:"Before basketball (20+10)"},after:{subject:"wh",label:"World History • Quiz",slot:"After basketball (20+10)"}},
    {before:{subject:"spa",label:"Spanish • Grammar",slot:"Before basketball (20+10)"},after:{subject:"env",label:"Env Sci • Unit 5 review",slot:"After basketball (20+10)"}},
    {before:{subject:"env",label:"Env Sci • Unit 8 quiz",slot:"Before basketball (20+10)"},after:{subject:"wh",label:"World History • Timeline",slot:"After basketball (20+10)"}},
  ];
  if(day===0){ // Sunday
    return [
      {subject:"env",label:"Block 1 • Env Sci Unit 5",slot:"Morning (20+10)"},
      {subject:"env",label:"Block 2 • Env Sci Unit 8",slot:"Morning (20+10)"},
      {subject:"spa",label:"Block 3 • Spanish vocab",slot:"Midday (20+10) — long break after"},
      {subject:"wh", label:"Block 4 • World History flashcards",slot:"Afternoon (20+10)"},
      {subject:"spa",label:"Block 5 • Spanish grammar",slot:"Afternoon (20+10)"},
      {subject:"env",label:"Block 6 • Env Sci Unit 9",slot:"Afternoon (20+10)"},
    ];
  }
  if(day===6){ // Saturday
    return [
      {subject:"wh", label:"Block 1 • World History Units 1–3",slot:"Morning (20+10)"},
      {subject:"env",label:"Block 2 • Env Sci Unit 5 quiz",slot:"Morning (20+10)"},
      {subject:"spa",label:"Block 3 • Spanish prompts",slot:"Midday (20+10) — long break after"},
      {subject:"env",label:"Block 4 • Env Sci Unit 8 flashcards",slot:"Afternoon (20+10)"},
      {subject:"wh", label:"Block 5 • World History timeline",slot:"Afternoon (20+10)"},
      {subject:"env",label:"Block 6 • Env Sci Unit 9 quiz",slot:"Afternoon (20+10)"},
    ];
  }
  const r = weekdayRotation[day];
  return [r.before, r.after];
}

/* ============================================================
   FLASHCARDS
============================================================ */
function openFlash(subject, deck){
  touchStreak();
  S[subject].flashSeen = (S[subject].flashSeen||0);
  // Prioritize focus units in env
  let ordered = [...deck];
  if(subject==="env"){
    ordered.sort((a,b)=>{
      const fa = [5,8,9].includes(a.u)?0:1;
      const fb = [5,8,9].includes(b.u)?0:1;
      return fa-fb;
    });
  }
  let i = 0;
  const root = document.getElementById("main");
  root.innerHTML = "";
  const wrap = el("div",{class:"view"});
  root.appendChild(wrap);
  const meta = el("div",{class:"flash-meta"});
  const card = el("div",{class:"flash"},
    el("div",{class:"flash-inner"},
      el("div",{class:"flash-face"}),
      el("div",{class:"flash-face flash-back"}),
    ),
  );
  card.addEventListener("click",()=>{card.classList.toggle("flipped");SFX.flip();});
  const nav = el("div",{class:"flash-nav"},
    el("button",{class:"btn",onclick:()=>{SFX.tap();i=(i-1+ordered.length)%ordered.length;show();}},"◀ Prev"),
    el("button",{class:"btn primary",onclick:()=>{SFX.correct();S[subject].flashSeen+=1;save();i=(i+1)%ordered.length;show();}},"Know it • Next ▶"),
  );
  const back = el("button",{class:"btn ghost",style:"margin-top:10px",onclick:()=>route(subject)},"← Back to "+subject.toUpperCase());
  wrap.appendChild(el("div",{class:"card"},
    el("h2",{},"Flashcards"),
    meta,
    card,
    nav,
    back,
  ));
  function show(){
    const c = ordered[i];
    const faces = card.querySelectorAll(".flash-face");
    faces[0].textContent = c.q;
    faces[1].textContent = c.a;
    card.classList.remove("flipped");
    const tag = c.u ? `Unit ${c.u}${[5,8,9].includes(c.u)?" ⭐":""}` : "Vocab";
    meta.innerHTML = `<span>${i+1} / ${ordered.length}</span><span>${tag}</span>`;
  }
  show();
}

/* ============================================================
   QUIZ
============================================================ */
function openQuiz(subject, bank){
  touchStreak();
  // Take up to 8 random questions, favoring focus units for env
  let pool = [...bank];
  if(subject==="env"){
    pool.sort(()=>Math.random()-.5);
    const focus = pool.filter(q=>[5,8,9].includes(q.u)).slice(0,5);
    const other = pool.filter(q=>![5,8,9].includes(q.u)).slice(0,3);
    pool = [...focus,...other].sort(()=>Math.random()-.5);
  } else {
    pool = pool.sort(()=>Math.random()-.5).slice(0,8);
  }
  let idx = 0, correct = 0;
  const main = document.getElementById("main");
  main.innerHTML = "";
  const wrap = el("div",{class:"view"});
  main.appendChild(wrap);
  const card = el("div",{class:"card"});
  wrap.appendChild(card);
  function next(){
    card.innerHTML = "";
    if(idx>=pool.length){
      const score = Math.round(100*correct/pool.length);
      S[subject].quizScores.push({date:todayStr(),score});
      save();
      card.appendChild(el("h2",{},"Done!"));
      card.appendChild(el("p",{style:"font-size:46px;font-weight:900;margin:8px 0"}, correct+" / "+pool.length));
      card.appendChild(el("p",{class:"muted"}, score+"% — nice work. This got saved to your progress."));
      card.appendChild(el("button",{class:"btn primary block",style:"margin-top:10px",onclick:()=>openQuiz(subject,bank)},"Retry"));
      card.appendChild(el("button",{class:"btn block",style:"margin-top:10px",onclick:()=>route(subject)},"Back"));
      return;
    }
    const q = pool[idx];
    card.appendChild(el("div",{class:"muted",style:"font-size:12px;text-transform:uppercase;letter-spacing:.7px"},`Q ${idx+1} of ${pool.length}${q.u?` • Unit ${q.u}`:""}`));
    card.appendChild(el("h2",{style:"margin:6px 0 12px;font-size:19px"}, q.q));
    const choices = el("div",{class:"choices"});
    const explain = el("div",{class:"explain"});
    q.c.forEach((txt,i)=>{
      const btn = el("button",{class:"choice",onclick:()=>{
        Array.from(choices.children).forEach(x=>x.setAttribute("disabled","true"));
        if(i===q.ans){ btn.classList.add("correct"); correct++; SFX.correct(); }
        else { btn.classList.add("wrong"); choices.children[q.ans].classList.add("correct"); SFX.wrong(); }
        explain.textContent = "💡 "+q.why;
        explain.classList.add("show");
        setTimeout(()=>{idx++;next();}, 1400);
      }}, String.fromCharCode(65+i)+". "+txt);
      choices.appendChild(btn);
    });
    card.appendChild(choices);
    card.appendChild(explain);
    card.appendChild(el("button",{class:"btn ghost block",style:"margin-top:10px",onclick:()=>route(subject)},"← Exit"));
  }
  next();
}

/* ============================================================
   CHECKLIST
============================================================ */
function openChecklist(subject, units){
  touchStreak();
  const main = document.getElementById("main");
  main.innerHTML = "";
  const wrap = el("div",{class:"view"});
  main.appendChild(wrap);
  const card = el("div",{class:"card"},
    el("h2",{},"Topic Checklist"),
    el("p",{class:"muted",style:"margin:0 0 10px"},"Check topics as Luca masters them. ⭐ = priority unit."),
  );
  units.forEach(u=>{
    const hdr = el("h3",{style:"margin:16px 0 8px;color:var(--muted);font-size:13px;letter-spacing:.8px;text-transform:uppercase"},
      `Unit ${u.id} • ${u.name}${u.weight?" • "+u.weight:""}`);
    card.appendChild(hdr);
    u.topics.forEach(t=>{
      const key = `${u.id}:${t}`;
      const done = S[subject].completed.includes(key);
      const row = el("div",{class:"chk"});
      const cb = el("input",{type:"checkbox"});
      cb.checked = done;
      cb.addEventListener("change",()=>{
        if(cb.checked){
          if(!S[subject].completed.includes(key)) S[subject].completed.push(key);
          SFX.check();
        } else {
          S[subject].completed = S[subject].completed.filter(k=>k!==key);
        }
        save();
      });
      row.appendChild(cb);
      row.appendChild(el("label",{},t));
      if(u.focus) row.appendChild(el("span",{class:"tag"},"⭐ focus"));
      card.appendChild(row);
    });
  });
  card.appendChild(el("button",{class:"btn block",style:"margin-top:12px",onclick:()=>route(subject)},"← Back"));
  wrap.appendChild(card);
}

    1:"**Ecosystems.** Energy flows one way; matter cycles. Only ~10% transfers up trophic levels. Producers → consumers → decomposers. GPP = total photosynthesis; NPP = GPP − respiration = what's available. C, N, P, and water cycles drive ecosystem function.",
    2:"**Biodiversity.** Genetic, species, and ecosystem diversity buffer against disturbance. Ecosystem services (provisioning, regulating, cultural, supporting) are the free benefits humans get. Disturbance → primary (bare rock) or secondary (soil remains) succession.",

function getELKey(){ return localStorage.getItem(EL_KEY_LS)||""; }
function getELVoiceId(){ return localStorage.getItem(EL_VID_LS)||""; }

async function fetchLuciaVoiceId(apiKey){
  let r;
  try{
    r = await fetch("https://api.elevenlabs.io/v1/voices",{
      headers:{"xi-api-key":apiKey}
    });
  }catch(netErr){
    throw new Error("Network error — check your internet connection.");
  }
  if(r.status===401) throw new Error("Invalid API key (401). Double-check you copied the full key.");
  if(!r.ok) throw new Error("ElevenLabs error "+r.status+". Try again.");
  const d = await r.json();
  const voices = d.voices||[];
  // Case-insensitive search for any voice with "lucia" in the name
  const lucia = voices.find(v=>{const n=v.name.toLowerCase();return n.includes("nadia lucia")||n.includes("lucia");});
  if(lucia) return lucia.voice_id;
  // Lucia not found in account — use the stable pre-made ID directly
  // (pre-made voices work with any valid API key even if not listed)
  console.warn("Lucia not found in voice list, using pre-made ID fallback. Available voices:", voices.map(v=>v.name));
  return EL_LUCIA_FALLBACK_ID;
}

let _elAudio = null; // current audio element
async function speakEL(text, apiKey, voiceId){
  if(_elAudio){ _elAudio.pause(); _elAudio=null; }
  const clean = text.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]/gu,"").trim();
  const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}?optimize_streaming_latency=3`,{
    method:"POST",
    headers:{"xi-api-key":apiKey,"Content-Type":"application/json"},
    body:JSON.stringify({
      text:clean,
      model_id:"eleven_multilingual_v2",
      voice_settings:{ stability:0.82, similarity_boost:0.50, style:0.38, use_speaker_boost:true }
    })
  });
  if(!r.ok) throw new Error("ElevenLabs TTS error "+r.status);
  const blob = await r.blob();
  const url  = URL.createObjectURL(blob);
  _elAudio   = new Audio(url);
  _elAudio.playbackRate = 0.92; // natural unhurried pace
  return new Promise((res,rej)=>{
    _elAudio.onended = ()=>{ URL.revokeObjectURL(url); res(); };
    _elAudio.onerror = rej;
    _elAudio.play().catch(rej);
  });
}

let _luciaGreetingPlayed = false;
function playLuciaGreeting(){

  _luciaGreetingPlayed = true;
  try{
    const a = new Audio(LUCIA_GREETING_B64);
    a.volume = 0.85;
    a.play().catch(()=>{});
  }catch(e){}
}

      el("h2",{},"Set up Profe Sofia's voice"),
      el("p",{style:"margin:0 0 16px;line-height:1.5"},

      el("ol",{style:"margin:0 0 16px;padding-left:18px;line-height:2;font-size:15px"},
        el("li",{},"Go to ", el("a",{href:"https://elevenlabs.io",target:"_blank",style:"color:var(--accent)"},"elevenlabs.io"), " and create a free account"),
        el("li",{},"Click your profile → API Keys → copy your key"),

          setTimeout(()=>openSpaAvatar(), 800);
        }catch(e){

          msg.textContent="❌ "+e.message;
        }
      }},"Connect Lucia's voice"),

        el("input",{id:"elVidInput",type:"text",placeholder:"Voice ID (e.g. pFZP5JQG7iQjIQuC4Bku)",

        el("button",{class:"btn",style:"font-size:13px",onclick:()=>{

          const msg = document.getElementById("elSetupMsg");

          localStorage.setItem(EL_VID_LS, vid);

  );

    // Speaking indicator
    const speakingDot = el("div",{style:"display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--panel2);border-radius:10px;margin-bottom:8px;font-size:13px;color:var(--accent2)"},"🔊 Profe Sofia is speaking...");

    // Chat bubbles
    const chat = el("div",{style:"display:flex;flex-direction:column;gap:12px;padding:4px 0 12px"});
    v.appendChild(el("div",{class:"card"},speakingDot,chat));

    // Input area
    const inputCard = el("div",{class:"card"});
    v.appendChild(inputCard);
    const hint = el("div",{class:"muted",style:"font-size:13px;margin-bottom:10px;padding:10px;background:var(--panel2);border-radius:10px"});
    const textarea = el("textarea",{style:"width:100%;min-height:80px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:15px;resize:none;color:var(--text)",placeholder:"Type your answer in Spanish here..."});
    const micBtn = el("button",{class:"btn warn block",style:"margin-bottom:10px"},"🎙️ Tap to speak");
    const nextBtn = el("button",{class:"btn primary block"},"Responder →");

    if(sttOk){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recog = new SR();
      recog.lang="es-ES"; recog.continuous=false; recog.interimResults=false;
      recog.onresult = e=>{ textarea.value=e.results[0][0].transcript; micBtn.textContent="🎙️ Tap to speak"; listening=false; };
      recog.onerror  = ()=>{ micBtn.textContent="🎙️ Tap to speak"; listening=false; };
      recog.onend    = ()=>{ micBtn.textContent="🎙️ Tap to speak"; listening=false; };
      micBtn.addEventListener("click",()=>{
        if(listening){ recog.stop(); }
        else{ recog.start(); listening=true; micBtn.textContent="🔴 Listening... tap to stop"; }
      });
      inputCard.appendChild(micBtn);
    }
    inputCard.appendChild(hint);
    inputCard.appendChild(textarea);
    inputCard.appendChild(nextBtn);

    function addBubble(text, isAvatar){
      const bubble = el("div",{style:`
        max-width:88%;align-self:${isAvatar?"flex-start":"flex-end"};
        padding:12px 16px;border-radius:${isAvatar?"4px 16px 16px 16px":"16px 16px 4px 16px"};
        background:${isAvatar?"var(--panel2)":"linear-gradient(135deg,#5bd1ff,#7ef0c5)"};
        color:${isAvatar?"var(--text)":"#0b1220"};font-size:15px;line-height:1.55;
        border:1px solid var(--line);
      `}, text);
      chat.appendChild(bubble);
      bubble.scrollIntoView({behavior:"smooth",block:"end"});
    }

    /* ---- ElevenLabs speak with speaking indicator ---- */
    async function speak(text){
      speakingDot.style.display="flex";
      nextBtn.disabled=true;
      try{
        if(!elVoiceId){
          elVoiceId = await fetchLuciaVoiceId(elKey);
          localStorage.setItem(EL_VID_LS, elVoiceId);
        }
        await speakEL(text, elKey, elVoiceId);
      }catch(e){
        // If EL fails (network, quota), fall back to Web Speech silently
        try{
          const u=new SpeechSynthesisUtterance(text.replace(/[\u{1F000}-\u{1FFFF}]/gu,""));
          u.lang="es-ES"; u.rate=0.8;
          window.speechSynthesis.speak(u);
          await new Promise(r=>{ u.onend=r; u.onerror=r; });
        }catch(_){}
      }finally{
        speakingDot.style.display="none";
        nextBtn.disabled=false;
      }
    }

    async function showTurn(){
      const ex = convo.exchanges[turn];
      addBubble(ex.avatar, true);
      hint.textContent = ex.hint;
      textarea.value=""; textarea.focus();
      nextBtn.textContent = turn<convo.exchanges.length-1?"Responder →":"Terminar";
      await speak(ex.avatar);
    }

    nextBtn.addEventListener("click",async()=>{
      const response = textarea.value.trim();
      if(!response){ textarea.style.border="1px solid #ff6b81"; setTimeout(()=>textarea.style.border="1px solid var(--line)",800); return; }
      SFX.check();
      addBubble(response, false);
      if(turn<convo.exchanges.length-1){
        turn++;
        setTimeout(()=>showTurn(),500);
      }else{
        const finalMsg = convo.exchanges[convo.exchanges.length-1].next;
        setTimeout(async()=>{
          addBubble(finalMsg,true);
          SFX.streak();
          inputCard.innerHTML="";
          inputCard.appendChild(el("button",{class:"btn primary block",onclick:()=>startConversation(themeIdx)},"Repeat this theme"));
          inputCard.appendChild(el("button",{class:"btn block",style:"margin-top:10px",onclick:()=>openSpaAvatar()},"Choose another theme"));
          await speak(finalMsg);
        },500);
      }
    });

    // Reset API key button in avatar header
    avatarHead.appendChild(el("button",{
      class:"btn ghost",
      style:"font-size:11px;color:var(--muted);padding:4px 8px;margin-top:8px",
      onclick:()=>{
        localStorage.removeItem(EL_KEY_LS);
        localStorage.removeItem(EL_VID_LS);
        openSpaAvatar();
      }
    },"Change API key"));

    showTurn();
  }
}

/* ============================================================
   FOCUS TIMER (20/10)
============================================================ */
let timerState = { running:false, phase:"focus", remaining:20*60, interval:null };
function renderTimer(root){
  const ring = el("div",{class:"ring"});
  const inner = el("div",{});
  const phase = el("div",{class:"phase"});
  const clock = el("div",{class:"clock"});
  inner.appendChild(phase); inner.appendChild(clock);
  ring.appendChild(inner);

  const buttons = el("div",{class:"btns",style:"margin-top:16px;justify-content:center"},
    el("button",{class:"btn primary",style:"font-size:18px",onclick:()=>{SFX.buzzerStart();startTimer(update);}},"🏀 TIP OFF"),
    el("button",{class:"btn",onclick:()=>{pauseTimer();update();}},"⏸ Pause"),
    el("button",{class:"btn",onclick:()=>{resetTimer("focus");update();}},"↺ Reset 20"),
    el("button",{class:"btn warn",onclick:()=>{resetTimer("break");update();}},"⏸ Timeout 5"),
  );

  const sessInfo = el("div",{class:"card",style:"margin-top:16px;text-align:center"});
  function updateSess(){
    sessInfo.innerHTML = "";
    sessInfo.appendChild(el("div",{class:"muted",style:"font-size:12px;text-transform:uppercase;letter-spacing:.8px"},"Today's Focus Blocks"));
    sessInfo.appendChild(el("div",{style:"font-size:32px;font-weight:900;color:var(--accent2)"}, String(sessionsToday())));
    sessInfo.appendChild(el("div",{class:"muted"},"quarters played 🏀"));
  }
  updateSess();

  const wrap = el("div",{class:"card"},
    el("h2",{style:"text-align:center"},"🏀 Game Clock — 20 min Study / 5 min Timeout"),
    el("div",{class:"timer"}, ring),
    buttons,
    el("p",{class:"muted",style:"text-align:center;margin:14px 0 0;font-size:13px"},
      "Buzzer starts the clock. Study hard for 20. Timeout for 5. Back on the court."),
  );
  root.appendChild(wrap);
  root.appendChild(sessInfo);

  function update(){
    const total = timerState.phase==="focus"?20*60:5*60;
    const p = 100*(1-(timerState.remaining/total));
    ring.style.setProperty("--p", p.toFixed(1));
    // basketball-themed phase labels
    if(timerState.phase==="focus"){
      phase.textContent = "🏀 GAME ON";
      ring.style.setProperty("--accent2","#7ef0c5");
    } else {
      phase.textContent = "⏸ TIMEOUT";
      ring.style.setProperty("--accent2","#ffb454");
    }
    const m = Math.floor(timerState.remaining/60), s = timerState.remaining%60;
    clock.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    updateSess();
  }
  update();
  window._timerUpdate = update;
}
function startTimer(update){
  if(timerState.running) return;
  timerState.running = true;
  timerState.interval = setInterval(()=>{
    timerState.remaining--;
    if(timerState.remaining<=0){
      if(timerState.phase==="focus"){
        addSessionToday();
        touchStreak();
        SFX.buzzerEnd();                                    // 🔊 BUZZER — session over
        try{ navigator.vibrate && navigator.vibrate([300,100,300,100,300]); }catch(e){}
        timerState.phase = "break"; timerState.remaining = 5*60;  // 5-min timeout
      } else {
        SFX.buzzerTimeout();                               // 🔊 BUZZER — timeout over, back on court
        try{ navigator.vibrate && navigator.vibrate([200,100,200]); }catch(e){}
        timerState.phase = "focus"; timerState.remaining = 20*60;
      }
    }
    update();
  }, 1000);
}
function pauseTimer(){
  timerState.running = false;
  clearInterval(timerState.interval);
}
function resetTimer(phase){
  pauseTimer();
  timerState.phase = phase;
  timerState.remaining = phase==="focus"?20*60:5*60;
}
function addSessionToday(){
  const t = todayStr();
  if(S.timer.lastDate!==t){ S.timer.lastDate=t; S.timer.sessionsToday=0; }
  S.timer.sessionsToday++;
  save();
}
function sessionsToday(){
  const t = todayStr();
  return S.timer.lastDate===t ? S.timer.sessionsToday : 0;
}
